name: Build GHCR KubeOpenCode

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Docker platforms to build
        required: false
        default: linux/amd64

permissions:
  contents: read
  packages: write

jobs:
  build-kubeopencode:
    name: Build and Push Controller Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build UI
        run: |
          cd ui && npm install && npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kubeopencode
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/kubeopencode:${{ github.sha }}
